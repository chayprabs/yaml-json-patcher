name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:coverage
      - run: pnpm --filter @configshape/yaml-json-patcher size-limit
      - run: pnpm --filter @configshape/cli build
      - run: pnpm build
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test:e2e
