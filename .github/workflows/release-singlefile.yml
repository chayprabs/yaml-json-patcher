name: Release Singlefile
on:
  push:
    tags: ["v*"]

jobs:
  singlefile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @configshape/web build:singlefile
        env:
          SINGLEFILE: "1"
      - uses: actions/upload-artifact@v4
        with:
          name: configshape-singlefile
          path: packages/web/dist/index.html
